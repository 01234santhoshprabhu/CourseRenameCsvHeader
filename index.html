<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Mapper Pro | Premium CSV Utility</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            500: '#0ea5e9',
                            600: '#0284c7',
                        },
                        accent: {
                            500: '#8b5cf6',
                            600: '#7c3aed',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%);
            min-height: 100vh;
        }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .premium-gradient {
            background: linear-gradient(135deg, #0ea5e9 0%, #8b5cf6 100%);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .input-premium {
            @apply w-full bg-white/50 border border-slate-200 rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all;
        }
    </style>
</head>

<body class="text-slate-900 antialiased py-12 px-6">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-12 fade-in">
            <h1 class="text-5xl font-black mb-4 tracking-tight">CSV Header <span
                    class="text-transparent bg-clip-text premium-gradient">Mapper</span></h1>
            <p class="text-slate-500 text-lg font-medium">Rename CSV headers by matching numbers instantly.</p>
        </div>

        <!-- Main Tool -->
        <div class="grid gap-8 fade-in" style="animation-delay: 0.1s">
            <!-- Step 1: Upload -->
            <div id="upload-section"
                class="glass-morphism rounded-[2.5rem] p-12 border-2 border-dashed border-slate-200 hover:border-primary-400 transition-all cursor-pointer group flex flex-col items-center gap-6"
                onclick="document.getElementById('file-input').click()">
                <input type="file" id="file-input" class="hidden" accept=".csv" onchange="handleFile(this.files[0])">
                <div
                    class="w-20 h-20 rounded-3xl premium-gradient flex items-center justify-center text-white shadow-xl shadow-primary-500/20 group-hover:scale-110 transition-transform">
                    <i data-lucide="upload-cloud" size="40"></i>
                </div>
                <div class="text-center">
                    <h3 class="text-2xl font-bold mb-1">Upload CSV File</h3>
                    <p class="text-slate-400">Click or drag & drop your source file</p>
                </div>
            </div>

            <!-- Mapping App (Hidden initially) -->
            <div id="mapping-section" class="hidden flex flex-col gap-8">
                <!-- Data Status Card -->
                <div
                    class="glass-morphism rounded-3xl p-6 flex items-center justify-between border-l-4 border-primary-500">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-12 h-12 rounded-2xl bg-primary-50 text-primary-600 flex items-center justify-center">
                            <i data-lucide="file-text"></i>
                        </div>
                        <div>
                            <p class="text-sm text-slate-400 font-bold uppercase">Active File</p>
                            <h4 id="file-name" class="font-bold text-slate-800">filename.csv</h4>
                        </div>
                    </div>
                    <button onclick="location.reload()"
                        class="p-2 text-slate-400 hover:text-rose-500 transition-colors">
                        <i data-lucide="refresh-cw"></i>
                    </button>
                </div>

                <!-- Mapping Table -->
                <div class="glass-morphism rounded-3xl p-8">
                    <div class="flex items-center justify-between mb-8">
                        <h3 class="text-2xl font-bold">Mapping Rules</h3>
                        <button onclick="addMapping()"
                            class="flex items-center gap-2 px-4 py-2 rounded-xl bg-slate-900 text-white hover:bg-slate-800 transition-all font-bold text-sm">
                            <i data-lucide="plus" size="18"></i> Add Rule
                        </button>
                    </div>

                    <div id="mapping-list" class="space-y-4 mb-8">
                        <!-- Mapping Row -->
                        <div
                            class="grid grid-cols-12 gap-4 items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                            <div class="col-span-11 grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block">Search
                                        Number</label>
                                    <input type="text" placeholder="e.g. 568"
                                        class="input-premium py-2 text-sm mapping-number" oninput="updatePreview()">
                                </div>
                                <div>
                                    <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block">New Header
                                        Name</label>
                                    <input type="text" placeholder="e.g. A2"
                                        class="input-premium py-2 text-sm mapping-name" oninput="updatePreview()">
                                </div>
                            </div>
                            <div class="col-span-1">
                                <button onclick="this.parentElement.parentElement.remove(); updatePreview()"
                                    class="text-slate-300 hover:text-rose-500 p-2 transition-colors">
                                    <i data-lucide="trash-2" size="18"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Transformation Preview -->
                    <div class="bg-slate-900 rounded-2xl p-6 overflow-hidden">
                        <h4 class="text-slate-400 text-xs font-black uppercase mb-4 flex items-center gap-2">
                            <i data-lucide="eye" size="14"></i> Header Preview
                        </h4>
                        <div class="flex flex-wrap gap-2" id="header-preview">
                            <!-- Previews here -->
                        </div>
                    </div>
                </div>

                <button onclick="downloadCSV()"
                    class="premium-gradient text-white py-4 rounded-[1.5rem] font-bold text-lg shadow-2xl shadow-primary-500/40 hover:opacity-90 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="download"></i> Download Modified CSV
                </button>
            </div>
        </div>
    </div>

    <script>
        let originalHeaders = [];
        let csvData = [];
        let originalFileName = "";

        // Initial mapping logic based on user request
        window.addEventListener('load', () => {
            const mappingInput = document.querySelector('.mapping-number');
            const nameInput = document.querySelector('.mapping-name');
            if (mappingInput) mappingInput.value = "570,571,572,573,567,601";
            if (nameInput) nameInput.value = "P6,P7,P8,P9,P10,A3";
            lucide.createIcons();
        });

        function handleFile(file) {
            if (!file) return;
            originalFileName = file.name;

            Papa.parse(file, {
                header: false,
                complete: function (results) {
                    originalHeaders = results.data[0] || [];
                    csvData = results.data.slice(1);

                    document.getElementById('file-name').innerText = file.name;
                    document.getElementById('upload-section').classList.add('hidden');
                    document.getElementById('mapping-section').classList.remove('hidden');

                    updatePreview();
                    lucide.createIcons();
                }
            });
        }

        function addMapping() {
            const list = document.getElementById('mapping-list');
            const row = document.createElement('div');
            row.className = "grid grid-cols-12 gap-4 items-center p-4 bg-slate-50 rounded-2xl border border-slate-100 fade-in";
            row.innerHTML = `
                <div class="col-span-11 grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block">Search Number</label>
                        <input type="text" placeholder="e.g. 123" class="input-premium py-2 text-sm mapping-number" oninput="updatePreview()">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block">New Header Name</label>
                        <input type="text" placeholder="e.g. NewCol" class="input-premium py-2 text-sm mapping-name" oninput="updatePreview()">
                    </div>
                </div>
                <div class="col-span-1">
                    <button onclick="this.parentElement.parentElement.remove(); updatePreview()" class="text-slate-300 hover:text-rose-500 p-2 transition-colors">
                        <i data-lucide="trash-2" size="18"></i>
                    </button>
                </div>
            `;
            list.appendChild(row);
            lucide.createIcons();
            updatePreview();
        }

        function updatePreview() {
            const mappings = getMappings();
            const previewEl = document.getElementById('header-preview');
            previewEl.innerHTML = '';

            originalHeaders.forEach(header => {
                let current = header;
                let changed = false;

                mappings.forEach(m => {
                    if (m.number && header.toString().includes(m.number)) {
                        current = m.name || current;
                        changed = true;
                    }
                });

                const badge = document.createElement('span');
                badge.className = changed
                    ? "px-3 py-1.5 rounded-lg bg-teal-500/20 text-teal-400 text-xs font-bold border border-teal-500/30"
                    : "px-3 py-1.5 rounded-lg bg-slate-800 text-slate-400 text-xs font-bold border border-slate-700";
                badge.innerText = current;
                previewEl.appendChild(badge);
            });
        }

        function getMappings() {
            const numbers = document.querySelectorAll('.mapping-number');
            const names = document.querySelectorAll('.mapping-name');
            const maps = [];

            numbers.forEach((n, i) => {
                const numStr = n.value.trim();
                const nameStr = names[i].value.trim();

                if (numStr) {
                    const numList = numStr.split(',').map(s => s.trim());
                    const nameList = nameStr.split(',').map(s => s.trim());

                    numList.forEach((num, idx) => {
                        if (num) {
                            maps.push({
                                number: num,
                                name: nameList[idx] || nameList[nameList.length - 1] || "" // Fallback to last name if shorter
                            });
                        }
                    });
                }
            });
            return maps;
        }

        function downloadCSV() {
            const mappings = getMappings();
            const newHeaders = originalHeaders.map(header => {
                let current = header;
                mappings.forEach(m => {
                    if (m.number && header.toString().includes(m.number)) {
                        current = m.name || current;
                    }
                });
                return current;
            });

            const finalData = [newHeaders, ...csvData];
            const csvBuffer = Papa.unparse(finalData);

            const blob = new Blob([csvBuffer], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "mapped_" + originalFileName);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Initialize Lucide
        lucide.createIcons();
    </script>
</body>

</html>
